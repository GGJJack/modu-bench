# ── Queue 정의 ────────────────────────────────────────────────────────────
# Mergify 최신 권고: merge 액션 대신 queue 액션 + queue_rules 사용.
# 조건은 모두 pull_request_rules 쪽에서 평가하므로 queue 자체는 미니멀 설정.
queue_rules:
  - name: default
    queue_conditions: []
    merge_conditions: []
    merge_method: squash

pull_request_rules:

  # ── Jules 자율 에이전트 PR 자동 머지 ──────────────────────────────────────
  # Jules는 JULES_PAT(GGJJack 개인 PAT)으로 PR을 생성하므로 author = GGJJack.
  # 라벨이 없기 때문에 PR 바디의 Jules 서명으로 식별한다.
  # "needs-review" 라벨을 수동으로 붙이면 자동 머지를 차단할 수 있다.
  - name: "Jules PR 자동 머지"
    conditions:
      - "author = GGJJack"
      - 'body ~= "PR created automatically by Jules"'
      - "base = master"
      - "-draft"
      - "-label = needs-review"
      - "-label = blocked"
    actions:
      queue:
        name: default

  # ── 수동 차단: needs-review 라벨이 있으면 댓글 알림 ────────────────────────
  # delete_head_branch 액션은 deprecated(2026-07-31 제거).
  # 브랜치 정리는 GitHub 저장소 설정 "Automatically delete head branches" 로 대체.
  - name: "needs-review 라벨 감지 알림"
    conditions:
      - "author = GGJJack"
      - 'body ~= "PR created automatically by Jules"'
      - "label = needs-review"
      - "-merged"
      - "-closed"
    actions:
      comment:
        message: |
          `needs-review` 라벨이 붙어 있어 자동 머지가 차단되었습니다.
          검토 후 라벨을 제거하면 Mergify가 자동으로 머지를 재시도합니다.
