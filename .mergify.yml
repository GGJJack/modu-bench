pull_request_rules:

  # ── Jules 자율 에이전트 PR 자동 머지 ──────────────────────────────────────
  # Jules는 JULES_PAT(GGJJack 개인 PAT)으로 PR을 생성하므로 author = GGJJack.
  # 라벨이 없기 때문에 PR 바디의 Jules 서명으로 식별한다.
  # "needs-review" 라벨을 수동으로 붙이면 자동 머지를 차단할 수 있다.
  - name: "Jules PR 자동 머지"
    conditions:
      - "author = GGJJack"
      - 'body ~= "PR created automatically by Jules"'
      - "base = master"
      - "-draft"
      - "-label = needs-review"
      - "-label = blocked"
    actions:
      merge:
        method: squash

  # ── 머지된 Jules 브랜치 자동 삭제 ─────────────────────────────────────────
  # Jules 브랜치(intro/..., init-..., jules/... 등)는 머지 후 불필요하므로 정리.
  - name: "Jules PR 머지 후 브랜치 삭제"
    conditions:
      - "merged"
      - "author = GGJJack"
      - 'body ~= "PR created automatically by Jules"'
    actions:
      delete_head_branch: {}

  # ── 수동 차단: needs-review 라벨이 있으면 댓글 알림 ────────────────────────
  - name: "needs-review 라벨 감지 알림"
    conditions:
      - "author = GGJJack"
      - 'body ~= "PR created automatically by Jules"'
      - "label = needs-review"
      - "-merged"
      - "-closed"
    actions:
      comment:
        message: |
          ⚠️ `needs-review` 라벨이 붙어 있어 자동 머지가 **차단**되었습니다.
          검토 후 라벨을 제거하면 Mergify가 자동으로 머지를 재시도합니다.
